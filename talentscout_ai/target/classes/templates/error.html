<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Error</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    color:white;
}

.error-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:45px;
    width:100%;
    max-width:600px;
    text-align:center;
}

.error-icon{
    font-size:60px;
}
</style>
</head>

<body>

<div class="error-card">

<div class="error-icon">⚠️</div>

<h1 class="mt-3" th:text="${errorTitle}"></h1>

<p class="mt-3 text-light" th:text="${errorMessage}"></p>

<a href="/" class="btn btn-light mt-4 px-4">
Go Back Home
</a>

</div>

</body>
</html>
