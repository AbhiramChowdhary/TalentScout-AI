<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Submission Successful</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:linear-gradient(135deg,#eefaf2,#ffffff);
}

.success-box{
    background:white;
    border-radius:20px;
    padding:50px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.check{
    font-size:60px;
}
</style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">
<div class="col-lg-7">

<div class="success-box text-center">

<div class="check">✅</div>

<h1 class="mt-3">Job Submitted Successfully</h1>

<p class="text-muted mt-3">
Your AI recruiter agent has received the job description
and started evaluating matching candidates.
</p>

<div class="row mt-4 g-3">

<div class="col-md-4">
<div class="border rounded p-3">
<h6>JD Parsed</h6>
<p class="mb-0 text-muted">Completed</p>
</div>
</div>

<div class="col-md-4">
<div class="border rounded p-3">
<h6>Matching</h6>
<p class="mb-0 text-muted">Completed</p>
</div>
</div>

<div class="col-md-4">
<div class="border rounded p-3">
<h6>Outreach</h6>
<p class="mb-0 text-muted">Ready</p>
</div>
</div>

</div>

<div class="mt-5">

<a href="/"
   class="btn btn-outline-secondary btn-lg px-4 me-2">
New Search
</a>

<a href="/"
   class="btn btn-primary btn-lg px-4">
Go Home
</a>

</div>

</div>

</div>
</div>

</div>

</body>
</html>
